function urlB64ToUint8Array(b64){
  var pad="=".repeat((4-b64.length%4)%4);
  var base=(b64+pad).replace(/-/g,"+").replace(/_/g,"/");
  var raw=atob(base);var out=new Uint8Array(raw.length);
  for(var i=0;i<raw.length;i++)out[i]=raw.charCodeAt(i);
  return out;
}

function rateOn(history,date){var r=0;for(var i=0;i<history.length;i++){if((history[i].from||"")<=date)r=history[i].rate;else break;}return r;}
// inclusive list of ISO dates from a to b, capped to 'cap' columns
function daysBetween(a,b,cap){if(!a||!b)return [];if(b<a){var t=a;a=b;b=t;}var out=[],d=a,n=0;cap=cap||92;while(d<=b&&n<cap){out.push(d);d=addDays(d,1);n++;}return out;}

// sheets: [{name, aoa}]. Uses SheetJS if loaded, else falls back to CSV download.
function downloadSheets(filename,sheets){
  try{
    if(typeof XLSX!=="undefined"&&XLSX.utils){
      var wb=XLSX.utils.book_new();
      sheets.forEach(function(s){XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(s.aoa),s.name.slice(0,31));});
      XLSX.writeFile(wb,filename+".xlsx");return;
    }
  }catch(e){}
  var csv=sheets.map(function(s){return (sheets.length>1?("# "+s.name+"\n"):"")+s.aoa.map(function(row){return row.map(csvCell).join(",");}).join("\n");}).join("\n\n");
  var blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});var url=URL.createObjectURL(blob);
  var a=document.createElement("a");a.href=url;a.download=filename+".csv";document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(function(){URL.revokeObjectURL(url);},1000);
}

function toISO(d){var x=new Date(d);return x.getFullYear()+"-"+String(x.getMonth()+1).padStart(2,"0")+"-"+String(x.getDate()).padStart(2,"0");}
function parseISO(s){if(!s||typeof s!=="string"){var d=new Date();return d;}var p=s.split("-").map(Number);return new Date(p[0],p[1]-1,p[2]);}
function todayISO(){return toISO(new Date());}
function addDays(iso,n){var d=parseISO(iso);d.setDate(d.getDate()+n);return toISO(d);}
function fmtShort(iso){return parseISO(iso).toLocaleDateString("en-US",{weekday:"short",month:"numeric",day:"numeric"});}
function fmtLong(iso){return parseISO(iso).toLocaleDateString("en-US",{weekday:"short",year:"numeric",month:"short",day:"numeric"});}
function fmtMDY(iso){return parseISO(iso).toLocaleDateString("en-US",{month:"numeric",day:"numeric",year:"numeric"});}
function fmtTime(t){if(!t)return "";try{return new Date("1970-01-01T"+t).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});}catch(e){return t;}}
function monthKey(iso){return iso.slice(0,7);}
function monthLabel(mk){var p=mk.split("-").map(Number);return new Date(p[0],p[1]-1,1).toLocaleDateString("en-US",{month:"long",year:"numeric"});}

// Per-move status (falls back to legacy done flag for older moves)

function moveLastAt(m){var h=m.statusHistory||[];return h.length?h[h.length-1].at:(m.doneAt||0);}
// Overall load status is derived from its moves: completed only when EVERY move is delivered.
function statusFromMoves(moves,fb){
  if(!moves.length)return fb==="completed"?"completed":"assigned";
  if(moves.every(function(m){return moveStatus(m)==="completed";}))return "completed";
  if(moves.some(function(m){return moveStatus(m)!=="assigned";}))return "inprogress";
  return "assigned";
}

// password hashing (SHA-256 when available)
function hashPw(s){
  return new Promise(function(resolve){
    try{
      if(window.crypto&&crypto.subtle){
        crypto.subtle.digest("SHA-256",new TextEncoder().encode(s)).then(function(buf){
          var arr=new Uint8Array(buf),out="",i;
          for(i=0;i<arr.length;i++){out+=("0"+arr[i].toString(16)).slice(-2);}
          resolve(out);
        }).catch(function(){resolve(fallbackHash(s));});
        return;
      }
    }catch(e){}
    resolve(fallbackHash(s));
  });
}
function fallbackHash(s){var hh=0,i;for(i=0;i<s.length;i++){hh=((hh<<5)-hh+s.charCodeAt(i))|0;}return "fb"+(hh>>>0).toString(16);}

// Merge a (snake_case, DB-shaped) load patch into the camelCase local model for optimistic UI.
function applyPatchToLoad(l,p){
  var n=Object.assign({},l);
  if("status" in p)n.status=p.status;
  if("status_history" in p)n.statusHistory=p.status_history;
  if("moves" in p)n.moves=p.moves;
