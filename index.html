function toISO(d){var x=new Date(d);return x.getFullYear()+"-"+String(x.getMonth()+1).padStart(2,"0")+"-"+String(x.getDate()).padStart(2,"0");}
function parseISO(s){var p=s.split("-").map(Number);return new Date(p[0],p[1]-1,p[2]);}

function addDays(iso,n){var d=parseISO(iso);d.setDate(d.getDate()+n);return toISO(d);}
function fmtShort(iso){return parseISO(iso).toLocaleDateString("en-US",{weekday:"short",month:"numeric",day:"numeric"});}

function fmtTime(t){if(!t)return "";try{return new Date("1970-01-01T"+t).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});}catch(e){return t;}}
function monthKey(iso){return iso.slice(0,7);}
function monthLabel(mk){var p=mk.split("-").map(Number);return new Date(p[0],p[1]-1,1).toLocaleDateString("en-US",{month:"long",year:"numeric"});}

// password hashing (SHA-256 when available)
function hashPw(s){
  return new Promise(function(resolve){
    try{
      if(window.crypto&&crypto.subtle){
        crypto.subtle.digest("SHA-256",new TextEncoder().encode(s)).then(function(buf){
          var arr=new Uint8Array(buf),out="",i;
          for(i=0;i<arr.length;i++){out+=("0"+arr[i].toString(16)).slice(-2);}
          resolve(out);
        }).catch(function(){resolve(fallbackHash(s));});
        return;
      }
    }catch(e){}
    resolve(fallbackHash(s));
  });
}
function fallbackHash(s){var hh=0,i;for(i=0;i<s.length;i++){hh=((hh<<5)-hh+s.charCodeAt(i))|0;}return "fb"+(hh>>>0).toString(16);}

    notes:r.notes||"", moves:Array.isArray(r.moves)?r.moves:[],
    status:r.status||"assigned", acknowledged:!!r.acknowledged, crewName:r.crew_name||"",
    createdAt:r.created_at?Date.parse(r.created_at):0,
  };
}
function loadToRow(L){
  return {
    driver_id:L.driverId, work_date:L.date, move_type:L.moveType,
    start_from:L.startFrom||"", start_time:L.startTime||"",

    notes:L.notes||"", moves:L.moves||[], status:L.status||"assigned", acknowledged:!!L.acknowledged, crew_name:L.crewName||"",
  };
}

var db = {
  fetchAll: async function(){
    var res = await Promise.all([
      sb.from("drivers").select("*").order("created_at"),
      sb.from("managers").select("*"),
      sb.from("schedule").select("*"),
      sb.from("loads").select("*").order("created_at"),
      sb.from("settings").select("*"),
    ]);
    if(res[0].error) throw new Error("drivers: "+res[0].error.message);
    if(res[2].error) throw new Error("schedule: "+res[2].error.message);
    if(res[3].error) throw new Error("loads: "+res[3].error.message);
    var schedule={};
    (res[2].data||[]).forEach(function(r){schedule[r.driver_id+"|"+r.work_date]={moveType:r.move_type};});
    var passwords={};var crews=[];
    (res[4].data||[]).forEach(function(r){
      if(r.key&&r.key.indexOf("pw:")===0)passwords[r.key]=r.value;
      if(r.key==="crews"){try{crews=JSON.parse(r.value)||[];}catch(e){crews=[];}}
    });
    return {
      drivers:res[0].data||[], managers:res[1].data||[],
      schedule:schedule, loads:(res[3].data||[]).map(rowToLoad), passwords:passwords, crews:crews
    };
  },
  getPw: async function(id){
    try{ var r=await sb.from("settings").select("value").eq("key","pw:"+id).limit(1); return (r.data&&r.data[0])?r.data[0].value:""; }

  insertLoad:   function(L){return sb.from("loads").insert(loadToRow(L));},

  deleteLoad:   function(id){return sb.from("loads").delete().eq("id",id);},
  setSetting:   function(key,value){return sb.from("settings").upsert({key:key,value:value});},
  setCrews:     function(arr){return sb.from("settings").upsert({key:"crews",value:JSON.stringify(arr)});},
  clearSetting: function(key){return sb.from("settings").delete().eq("key",key);},
  wipe: async function(){
    await sb.from("loads").delete().neq("id","00000000-0000-0000-0000-000000000000");
    await sb.from("schedule").delete().neq("work_date","1900-01-01");
    await sb.from("managers").delete().neq("id","00000000-0000-0000-0000-000000000000");
    await sb.from("drivers").delete().neq("id","00000000-0000-0000-0000-000000000000");
    await sb.from("settings").delete().neq("key","");
  },
};

// ---- SignIn (Manager / Driver + per-person passwords) ----
function SignIn(props){
  var drivers=props.drivers, managers=props.managers, passwords=props.passwords, onSignIn=props.onSignIn;
  var s1=useState(null); var mode=s1[0]; var setMode=s1[1];            // "manager" | "driver"
  var s2=useState(""); var selId=s2[0]; var setSelId=s2[1];
  var s3=useState(""); var pw1=s3[0]; var setPw1=s3[1];
  var s4=useState(""); var pw2=s4[0]; var setPw2=s4[1];
  var s5=useState(""); var err=s5[0]; var setErr=s5[1];
  var s6=useState(false); var busy=s6[0]; var setBusy=s6[1];

  var list = mode==="manager" ? managers : drivers;
  var hasPw = selId ? !!passwords["pw:"+selId] : false;

  function reset(){ setMode(null); setSelId(""); setPw1(""); setPw2(""); setErr(""); }
  function back(){ if(selId){ setSelId(""); setPw1(""); setPw2(""); setErr(""); } else { reset(); } }

  async function submit(){
    if(!selId) return;
    setBusy(true); setErr("");
    try{
      var person = list.find(function(p){return p.id===selId;});
      var name = person ? person.name : "";
      var identity = mode==="manager" ? {role:"dispatch", id:selId, name:name} : {role:"driver", driverId:selId, name:name};
      var hash = await hashPw(pw1);
      var stored = await db.getPw(selId); // fresh check
      if(stored){
        if(hash!==stored){ setErr("Incorrect password. Try again."); setBusy(false); return; }
      }else{
        if(pw1.length<4){ setErr("Password must be at least 4 characters."); setBusy(false); return; }
        if(pw1!==pw2){ setErr("Passwords don't match."); setBusy(false); return; }
        await db.setSetting("pw:"+selId, hash);
      }
      onSignIn(identity);
    }catch(e){ setErr("Error: "+(e&&e.message?e.message:e)); setBusy(false); }
  }

  return h("div",{className:"min-h-screen bg-slate-900 flex items-center justify-center p-4"},
    h("div",{className:"bg-white rounded-2xl shadow-xl w-full max-w-sm p-6"},
      h("div",{className:"text-center text-3xl mb-1"},"🚛"),
      h("h1",{className:"text-center font-bold text-lg text-slate-800"},"Heavy Haul Dispatch"),
      h("p",{className:"text-center text-xs text-slate-500 mb-5"},"Sign in to continue"),

      !mode && h("div",{className:"space-y-2"},
        h("button",{onClick:function(){setMode("manager");},className:"w-full bg-slate-900 text-white rounded-lg py-3 font-medium"},"Manager"),
        h("button",{onClick:function(){setMode("driver");},className:"w-full border-2 border-slate-300 rounded-lg py-3 font-medium text-slate-700"},"Driver")),

      mode && h("div",{className:"space-y-3"},
        // manager bootstrap when none exist
        mode==="manager"&&managers.length===0 && h(Fragment,null,
          h("p",{className:"text-sm text-slate-500 text-center"},"No managers added yet. Continue to set up the app, then add managers in the Manage tab."),
          h("button",{onClick:function(){onSignIn({role:"dispatch",name:"Manager"});},className:"w-full bg-slate-900 text-white rounded-lg py-2.5 font-medium"},"Continue as Manager")),

        mode==="driver"&&drivers.length===0 && h("p",{className:"text-sm text-slate-500 text-center"},"No drivers added yet. Ask a manager to add you."),

        list.length>0 && h(Fragment,null,
          h("label",{className:"text-sm font-medium text-slate-600"},mode==="manager"?"Select your name (Manager)":"Select your name"),
          h("select",{value:selId,onChange:function(e){setSelId(e.target.value);setPw1("");setPw2("");setErr("");},className:"inp"},
            h("option",{value:""},"— choose —"),
            list.map(function(p){return h("option",{key:p.id,value:p.id},p.name);})),

          selId && !hasPw && h(Fragment,null,
            h("p",{className:"text-xs text-teal-700 bg-teal-50 rounded-lg px-2.5 py-1.5"},"First time signing in — create a password you'll use from now on."),
            h("input",{type:"password",value:pw1,onChange:function(e){setPw1(e.target.value);},className:"inp",placeholder:"Create a password"}),
            h("input",{type:"password",value:pw2,onChange:function(e){setPw2(e.target.value);},className:"inp",placeholder:"Confirm password"})),

          selId && hasPw && h("input",{type:"password",value:pw1,onChange:function(e){setPw1(e.target.value);},className:"inp",placeholder:"Enter your password"}),

          err && h("p",{className:"text-xs text-red-600"},err),

          selId && h("button",{disabled:busy||!pw1,onClick:submit,className:"w-full bg-teal-600 disabled:opacity-40 text-white rounded-lg py-2.5 font-medium"},busy?"…":(hasPw?"Sign in":"Set password & sign in"))),

        h("button",{onClick:back,className:"w-full text-sm text-slate-500"},"Back"))));
}

function App(){
  if(!configured) return h(SetupScreen,null);
  var s1=useState(loadIdentity()); var identity=s1[0]; var setIdentity=s1[1];
  var s2=useState([]); var drivers=s2[0]; var setDrivers=s2[1];
  var s3=useState({}); var schedule=s3[0]; var setSchedule=s3[1];
  var s4=useState([]); var loads=s4[0]; var setLoads=s4[1];
  var s5=useState([]); var managers=s5[0]; var setManagers=s5[1];
  var s6=useState({}); var passwords=s6[0]; var setPasswords=s6[1];
  var s7=useState(true); var loading=s7[0]; var setLoading=s7[1];
  var s8=useState(""); var toast=s8[0]; var setToast=s8[1];
  var s9=useState(""); var dbError=s9[0]; var setDbError=s9[1];
  var s10=useState(identity?(identity.role==="driver"?"myloads":"dispatch"):"dispatch"); var view=s10[0]; var setView=s10[1];
  var s11=useState(null); var installEvt=s11[0]; var setInstallEvt=s11[1];
  var s12=useState([]); var crews=s12[0]; var setCrews=s12[1];

  function showToast(m){setToast(m);setTimeout(function(){setToast("");},1800);}

  var refresh=useCallback(async function(spin){
    if(spin) setLoading(true);
    try{
      var d=await db.fetchAll();
      setDrivers(d.drivers); setManagers(d.managers);
      setSchedule(d.schedule); setLoads(d.loads);
      setPasswords(d.passwords); setCrews(d.crews||[]); setDbError("");
    }catch(e){
      console.error(e);
      setDbError(e&&e.message?e.message:String(e));
    }
    setLoading(false);
  },[]);

  useEffect(function(){refresh(true);},[refresh]);
  useEffect(function(){
    var ch;
    try{ch=sb.channel("hhd").on("postgres_changes",{event:"*",schema:"public"},function(){refresh(false);}).subscribe();}catch(e){}
    var t=setInterval(function(){refresh(false);},12000);
    function onFocus(){refresh(false);}
    window.addEventListener("focus",onFocus);
    document.addEventListener("visibilitychange",function(){if(!document.hidden)refresh(false);});
    return function(){clearInterval(t);window.removeEventListener("focus",onFocus);try{sb.removeChannel(ch);}catch(e){}};
  },[refresh]);
  useEffect(function(){
    function fn(e){e.preventDefault();setInstallEvt(e);}
    window.addEventListener("beforeinstallprompt",fn);
    return function(){window.removeEventListener("beforeinstallprompt",fn);};
  },[]);

  async function act(fn,msg){
    try{await fn();await refresh(false);if(msg)showToast(msg);}
    catch(e){console.error(e);showToast("Error — check connection");}
  }
  function signIn(id){setIdentity(id);saveIdentity(id);setView(id.role==="driver"?"myloads":"dispatch");}
  function signOut(){setIdentity(null);saveIdentity(null);}
  function driverName(id){var d=drivers.find(function(x){return x.id===id;});return d?d.name:"Unknown";}

            isMove?h("span",{className:"inline-block rounded font-semibold text-[10px] px-1.5 py-0.5 "+info.chip},info.label):
            isWorking?h("span",{className:"inline-block rounded font-semibold text-[10px] px-1.5 py-0.5 "+WORKING.chip},"✓ Working"):
            h("span",{className:"text-[11px] text-slate-300 font-medium"},"+ Tap to work")));
      })));
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App,null));
</script>

if("serviceWorker"in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("sw.js").catch(function(){});});}
