function subscribeToPush(driverId){

function downloadSheets(filename,sheets){
  try{
    if(typeof XLSX!=="undefined"&&XLSX.utils){
      var wb=XLSX.utils.book_new();
      sheets.forEach(function(s){XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(s.aoa),s.name.slice(0,31));});
      XLSX.writeFile(wb,filename+".xlsx");return;
    }
  }catch(e){}
  var csv=sheets.map(function(s){return (sheets.length>1?("# "+s.name+"\n"):"")+s.aoa.map(function(row){return row.map(csvCell).join(",");}).join("\n");}).join("\n\n");

function toISO(d){var x=new Date(d);return x.getFullYear()+"-"+String(x.getMonth()+1).padStart(2,"0")+"-"+String(x.getDate()).padStart(2,"0");}
function parseISO(s){if(!s||typeof s!=="string"){var d=new Date();return d;}var p=s.split("-").map(Number);return new Date(p[0],p[1]-1,p[2]);}
function todayISO(){return toISO(new Date());}
function addDays(iso,n){var d=parseISO(iso);d.setDate(d.getDate()+n);return toISO(d);}

function fmtTime(t){if(!t)return "";try{return new Date("1970-01-01T"+t).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});}catch(e){return t;}}
function monthKey(iso){return iso.slice(0,7);}

// Overall load status is derived from its moves: completed only when EVERY move is delivered.
function statusFromMoves(moves,fb){

}

// password hashing (SHA-256 when available)
function hashPw(s){
  return new Promise(function(resolve){
    try{
      if(window.crypto&&crypto.subtle){
        crypto.subtle.digest("SHA-256",new TextEncoder().encode(s)).then(function(buf){
          var arr=new Uint8Array(buf),out="",i;
          for(i=0;i<arr.length;i++){out+=("0"+arr[i].toString(16)).slice(-2);}
          resolve(out);
        }).catch(function(){resolve(fallbackHash(s));});
        return;
      }
    }catch(e){}
    resolve(fallbackHash(s));
  });
}
function fallbackHash(s){var hh=0,i;for(i=0;i<s.length;i++){hh=((hh<<5)-hh+s.charCodeAt(i))|0;}return "fb"+(hh>>>0).toString(16);}

// Merge a (snake_case, DB-shaped) load patch into the camelCase local model for optimistic UI.
function applyPatchToLoad(l,p){
  var n=Object.assign({},l);
  if("status" in p)n.status=p.status;
  if("status_history" in p)n.statusHistory=p.status_history;
  if("moves" in p)n.moves=p.moves;
  if("checklist" in p)n.checklist=p.checklist;
  if("photos" in p)n.photos=p.photos;
  if("comments" in p)n.comments=p.comments;
  if("acknowledged" in p)n.acknowledged=p.acknowledged;
  if("acknowledged_at" in p)n.acknowledgedAt=p.acknowledged_at?Date.parse(p.acknowledged_at):0;
  if("problem_type" in p)n.problemType=p.problem_type||"";
  if("problem_note" in p)n.problemNote=p.problem_note||"";
  if("problem_at" in p)n.problemAt=p.problem_at?Date.parse(p.problem_at):0;
  if("archived" in p)n.archived=!!p.archived;
  if("truck" in p)n.truck=p.truck||"";
  if("trailer" in p)n.trailer=p.trailer||"";
  return n;
}
function applyOutbox(loads){
  var ob=readOutbox(); if(!ob.length)return loads;
  return loads.map(function(l){
    var ops=ob.filter(function(o){return o.id===l.id;});
    return ops.reduce(function(acc,o){return applyPatchToLoad(acc,o.patch);},l);
  });
}

          l.notes?h("div",{className:"text-xs text-slate-500 mt-2 bg-slate-50 rounded p-2 whitespace-pre-wrap"},l.notes):null);
      })),
    done.length>0?h(Fragment,null,

      h("div",{className:"space-y-1.5"},
        done.slice(0,15).map(function(l){
          var ms=getMoves(l);
          return h("div",{key:l.id,className:"bg-white/70 rounded-lg p-2.5 shadow-sm flex items-center gap-2 text-sm"},
            "✅",h("span",{className:"text-slate-500"},fmtShort(l.date)),h(MoveChip,{id:l.moveType}),
            h("span",{className:"text-slate-600 truncate"},ms.length+" move"+(ms.length!==1?"s":"")),

        }))):null,

function TodaySummary(props){
  try{
  var loads=props.loads;
  var t=todayISO();
  var today=loads.filter(function(l){return l.date===t;}).sort(function(a,b){return (a.createdAt||0)-(b.createdAt||0);});
  var moves=today.reduce(function(acc,l){return acc.concat(getMoves(l));},[]);
  var done=moves.filter(function(m){return m.done;}).length;
  var pct=moves.length?Math.round(done/moves.length*100):0;
  var start=today.find(function(l){return l.startTime||l.startFrom;});
  return h("div",{className:"bg-slate-900 text-white rounded-xl p-4 shadow"},
    h("div",{className:"flex items-center gap-2"},"📅 ",h("span",{className:"font-semibold text-sm"},"Today · "+parseISO(t).toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric"}))),
    moves.length===0?h("p",{className:"text-slate-400 text-sm mt-2"},"No moves scheduled for today."):
    h(Fragment,null,
      start?h("div",{className:"text-teal-300 text-sm mt-1 font-medium"},(start.startTime?"Start "+fmtTime(start.startTime):"")+(start.startFrom?" from "+start.startFrom:"")):null,
      h("div",{className:"flex items-baseline gap-2 mt-2"},
        h("span",{className:"text-3xl font-bold"},done,h("span",{className:"text-slate-500 text-xl"},"/"+moves.length)),
        h("span",{className:"text-sm text-slate-400"},"moves done · "+today.length+" assignment"+(today.length!==1?"s":""))),
      h("div",{className:"w-full bg-slate-700 rounded-full h-2 mt-2 overflow-hidden"},h("div",{className:"bg-teal-400 h-full rounded-full",style:{width:pct+"%"}})),
      h("div",{className:"mt-3 space-y-1.5"},
        moves.map(function(m){
          return h("div",{key:m.id,className:"flex items-center gap-2 text-sm"},
            h("span",{className:"w-4 h-4 rounded-full flex items-center justify-center shrink-0 text-[10px] "+(m.done?"bg-teal-500":"bg-slate-700")},m.done?"✓":""),
            h("span",{className:"truncate "+(m.done?"text-slate-500 line-through":"text-slate-200")},(m.pickupPad||"—")+" → "+(m.dropPad||"—")));
        }))));
  }catch(e){return h("div",{className:"bg-slate-800 text-red-300 rounded-xl p-3 text-xs"},"Summary error: "+e.message);}
}

// ---- MySchedule (driver self-scheduling) ----
function MySchedule(props){
  var identity=props.identity,schedule=props.schedule,act=props.act;
  var s1=useState(todayISO()); var start=s1[0]; var setStart=s1[1];
  var s2=useState("week"); var range=s2[0]; var setRange=s2[1];
  var nDays=rangeDaysOf(range);
  var days=useMemo(function(){return Array.from({length:nDays},function(_,i){return addDays(start,i);});},[start,nDays]);
  function entry(d){return schedule[identity.driverId+"|"+d];}
  function toggleDay(d){
    var cur=entry(d);
    if(cur&&cur.moveType&&cur.moveType!=="working")return; // a manager assigned a move — locked
    if(cur&&cur.moveType==="working") act(function(){return db.clearSchedule(identity.driverId,d);});
    else act(function(){return db.setSchedule(identity.driverId,d,"working");});
  }
  return h("div",{className:"space-y-3"},
    h("div",{className:"bg-white rounded-xl p-3 shadow-sm space-y-2"},
      h("div",{className:"flex flex-wrap gap-1"},
        RANGES.map(function(r){return h("button",{key:r.id,onClick:function(){setRange(r.id);},className:"text-xs px-2.5 py-1 rounded-lg font-medium "+(range===r.id?"bg-teal-600 text-white":"bg-slate-100 text-slate-600")},r.label);})),
      h("div",{className:"flex items-center gap-2"},
        h("button",{onClick:function(){setStart(addDays(start,-nDays));},className:"p-1.5 rounded hover:bg-slate-100"},"‹"),
        h("span",{className:"text-sm font-medium"},nDays===1?fmtShort(days[0]):(fmtShort(days[0])+" – "+fmtShort(days[days.length-1]))),
        h("button",{onClick:function(){setStart(addDays(start,nDays));},className:"p-1.5 rounded hover:bg-slate-100"},"›"),
        h("button",{onClick:function(){setStart(todayISO());},className:"text-xs px-2 py-1 rounded bg-slate-100 ml-auto"},"Today"))),
    h("p",{className:"text-xs text-slate-500 px-1"},"Tap a day to mark yourself ",h("span",{className:"font-semibold text-teal-700"},"Working")," so managers can see your availability. Days a manager has assigned you a move show that move and are locked."),
    h("div",{className:"grid grid-cols-2 sm:grid-cols-3 gap-2"},
      days.map(function(d){
        var e=entry(d); var info=e&&schedInfo(e.moveType);
        var isWorking=e&&e.moveType==="working";
        var isMove=e&&e.moveType&&e.moveType!=="working";
        var isToday=d===todayISO();
        return h("button",{key:d,onClick:function(){toggleDay(d);},disabled:isMove,
          className:"rounded-xl p-2.5 text-left border-2 transition "+
            (isMove?"border-slate-200 bg-white cursor-default":
             isWorking?"border-teal-400 bg-teal-50":
             "border-dashed border-slate-200 bg-white hover:border-teal-300")},
          h("div",{className:"flex items-center justify-between"},
            h("div",{className:"text-[11px] font-semibold "+(isToday?"text-teal-700":"text-slate-500")},parseISO(d).toLocaleDateString("en-US",{weekday:"short"})+(isToday?" · Today":"")),
            isToday?h("span",{className:"w-1.5 h-1.5 rounded-full bg-teal-500"}):null),
          h("div",{className:"text-sm font-bold text-slate-800"},parseISO(d).toLocaleDateString("en-US",{month:"short",day:"numeric"})),
          h("div",{className:"mt-1.5"},
            isMove?h("span",{className:"inline-block rounded font-semibold text-[10px] px-1.5 py-0.5 "+info.chip},info.label):
            isWorking?h("span",{className:"inline-block rounded font-semibold text-[10px] px-1.5 py-0.5 "+WORKING.chip},"✓ Working"):
            h("span",{className:"text-[11px] text-slate-300 font-medium"},"+ Tap to work")));
      })));
}
